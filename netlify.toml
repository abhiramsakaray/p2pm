# Next.js app in the frontend/ subfolder (monorepo). No `base` — that makes the
# publish default to the base dir and collide with the Next.js plugin. Build from
# the repo root into frontend/, and publish frontend/.next (≠ base = repo root).
[build]
  command = "npm --prefix frontend install && npm --prefix frontend run build"
  publish = "frontend/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
